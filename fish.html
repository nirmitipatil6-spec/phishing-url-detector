<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Phishing Detection Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #0ea5e9;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --critical: #dc2626;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(14, 165, 233, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(14, 165, 233, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1em;
        }

        .card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-out 0.1s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-primary);
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
            background: rgba(15, 23, 42, 0.8);
        }

        input[type="text"]::placeholder {
            color: var(--text-secondary);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
        }

        button:hover::before {
            left: 100%;
        }

        .btn-analyze {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.6);
        }

        .btn-analyze:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: rgba(71, 85, 105, 0.5);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-reset:hover {
            background: rgba(71, 85, 105, 0.8);
            border-color: var(--accent);
        }

        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(14, 165, 233, 0.3);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 1.1em;
        }

        .results {
            display: none;
        }

        .risk-header {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
        }

        .risk-score {
            font-size: 3.5em;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .risk-meter {
            width: 100%;
            height: 8px;
            background: rgba(71, 85, 105, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .risk-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.8s ease, background-color 0.3s ease;
            width: 0%;
        }

        .risk-level {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1.05em;
            letter-spacing: 0.5px;
        }

        .risk-level.safe {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .risk-level.low {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .risk-level.medium {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .risk-level.high {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .risk-level.critical {
            background: rgba(220, 38, 38, 0.2);
            color: var(--critical);
            border: 1px solid var(--critical);
        }

        .detail-item {
            background: rgba(15, 23, 42, 0.6);
            border-left: 4px solid var(--border);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .detail-item:hover {
            background: rgba(15, 23, 42, 0.8);
            border-left-color: var(--accent);
        }

        .detail-item.safe {
            border-left-color: var(--success);
        }

        .detail-item.warning {
            border-left-color: var(--warning);
        }

        .detail-item.suspicious {
            border-left-color: var(--danger);
        }

        .detail-item.critical {
            border-left-color: var(--critical);
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .detail-name {
            font-weight: 600;
            font-size: 1.1em;
            color: var(--text-primary);
        }

        .detail-status {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-safe {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .status-suspicious {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .status-critical {
            background: rgba(220, 38, 38, 0.2);
            color: var(--critical);
        }

        .status-invalid {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .status-resolved {
            background: rgba(14, 165, 233, 0.2);
            color: var(--accent);
        }

        .detail-reason {
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .detail-risk {
            display: inline-block;
            background: rgba(71, 85, 105, 0.3);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--accent);
            font-weight: 600;
        }

        .timestamp {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 20px;
        }

        .error-message {
            display: none;
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid var(--critical);
            border-radius: 8px;
            padding: 20px;
            color: var(--critical);
            margin-bottom: 25px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .card {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            .risk-score {
                font-size: 2.5em;
            }

            .detail-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }

        .info-box {
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.9em;
            color: var(--text-secondary);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Phishing Detection</h1>
            <p>Advanced URL Security Analysis Tool</p>
        </div>

        <div class="card">
            <div class="error-message" id="errorMessage"></div>

            <div class="input-group">
                <label for="urlInput">Enter URL to Analyze</label>
                <input 
                    type="text" 
                    id="urlInput" 
                    placeholder="https://example.com or example.com"
                    autocomplete="off"
                >
            </div>

            <div class="button-group">
                <button class="btn-analyze" id="analyzeBtn">🔍 Analyze URL</button>
                <button class="btn-reset" id="resetBtn">↺ Reset</button>
            </div>

            <div class="info-box">
                <strong>Detection Features:</strong> URL Length • HTTPS Protocol • Suspicious Keywords • Brand-Domain Mismatch • Subdomain Abuse • Typosquatting • Domain Validation • Redirect Chain Analysis
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Analyzing URL security...</div>
        </div>

        <div class="results" id="results">
            <div class="card">
                <div class="risk-header">
                    <div class="risk-score" id="riskScore">0</div>
                    <div class="risk-meter">
                        <div class="risk-fill" id="riskFill"></div>
                    </div>
                    <div class="risk-level" id="riskLevel">SAFE</div>
                </div>

                <div id="detailsContainer"></div>

                <div class="timestamp" id="timestamp"></div>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const errorMessage = document.getElementById('errorMessage');

        analyzeBtn.addEventListener('click', analyzeURL);
        resetBtn.addEventListener('click', resetForm);
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') analyzeURL();
        });

        async function analyzeURL() {
            const url = urlInput.value.trim();

            if (!url) {
                showError('Please enter a URL to analyze');
                return;
            }

            errorMessage.classList.remove('show');
            loading.style.display = 'block';
            results.style.display = 'none';
            analyzeBtn.disabled = true;

            try {
                // Use local Python backend if available, otherwise use demo mode
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                }).catch(() => null);

                if (response && response.ok) {
                    const data = await response.json();
                    displayResults(data);
                } else {
                    // Demo mode - simulate analysis
                    const data = simulateAnalysis(url);
                    displayResults(data);
                }
            } catch (error) {
                showError('Error analyzing URL: ' + error.message);
            } finally {
                loading.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        }

        function simulateAnalysis(url) {
            // This runs the detection logic in JavaScript for demo
            let riskScore = 0;
            const details = [];

            const urlLower = url.toLowerCase();
            const urlLength = url.length;
            const hasHttps = url.startsWith('https://');
            const domain = new URL(url.startsWith('http') ? url : 'https://' + url).hostname;

            // URL Length check
            if (urlLength > 75) {
                riskScore += Math.min(20, Math.floor((urlLength - 75) / 10));
                details.push({
                    check: 'URL Length',
                    status: 'SUSPICIOUS',
                    reason: `URL is unusually long (${urlLength} chars)`,
                    risk: 15
                });
            } else {
                details.push({
                    check: 'URL Length',
                    status: 'SAFE',
                    reason: `URL length is normal (${urlLength} chars)`,
                    risk: 0
                });
            }

            // HTTPS check
            if (!hasHttps) {
                riskScore += 25;
                details.push({
                    check: 'HTTPS Protocol',
                    status: 'SUSPICIOUS',
                    reason: 'URL uses insecure HTTP instead of HTTPS',
                    risk: 25
                });
            } else {
                details.push({
                    check: 'HTTPS Protocol',
                    status: 'SAFE',
                    reason: 'URL uses secure HTTPS protocol',
                    risk: 0
                });
            }

            // Suspicious keywords
            const keywords = ['login', 'verify', 'confirm', 'urgent', 'update', 'suspended'];
            const found = keywords.filter(k => urlLower.includes(k));
            if (found.length > 0) {
                riskScore += Math.min(20, found.length * 5);
                details.push({
                    check: 'Suspicious Keywords',
                    status: 'WARNING',
                    reason: `Found suspicious keywords: ${found.join(', ')}`,
                    risk: Math.min(20, found.length * 5)
                });
            } else {
                details.push({
                    check: 'Suspicious Keywords',
                    status: 'SAFE',
                    reason: 'No suspicious keywords detected',
                    risk: 0
                });
            }

            // Brand-Domain Mismatch
            const brands = {
                'microsoft.com': ['microsoft', 'outlook', 'azure'],
                'google.com': ['google', 'gmail', 'youtube'],
                'apple.com': ['apple', 'icloud']
            };

            let mismatch = false;
            for (const [brandDomain, keywords_list] of Object.entries(brands)) {
                if (keywords_list.some(k => urlLower.includes(k)) && !domain.includes(brandDomain.split('.')[0])) {
                    riskScore += 30;
                    mismatch = true;
                    details.push({
                        check: 'Brand-Domain Mismatch',
                        status: 'CRITICAL',
                        reason: `${keywords_list[0].toUpperCase()} content but domain is ${domain} (not ${brandDomain})`,
                        risk: 30
                    });
                    break;
                }
            }

            if (!mismatch) {
                details.push({
                    check: 'Brand-Domain Mismatch',
                    status: 'SAFE',
                    reason: 'No brand-domain mismatches detected',
                    risk: 0
                });
            }

            // Subdomain check
            const dotCount = domain.split('.').length - 1;
            if (dotCount > 3) {
                riskScore += 15;
                details.push({
                    check: 'Subdomain Abuse',
                    status: 'SUSPICIOUS',
                    reason: `Unusually high number of subdomains (${dotCount} dots)`,
                    risk: 15
                });
            } else {
                details.push({
                    check: 'Subdomain Abuse',
                    status: 'SAFE',
                    reason: 'Normal subdomain structure',
                    risk: 0
                });
            }

            // Typosquatting
            const typos = ['micr0soft', 'gogle', 'aple', 'amaz0n'];
            if (typos.some(t => domain.includes(t))) {
                riskScore += 35;
                details.push({
                    check: 'Typosquatting Detection',
                    status: 'CRITICAL',
                    reason: 'Typosquatting pattern detected',
                    risk: 35
                });
            } else {
                details.push({
                    check: 'Typosquatting Detection',
                    status: 'SAFE',
                    reason: 'No typosquatting patterns detected',
                    risk: 0
                });
            }

            // Domain validation
            details.push({
                check: 'Domain Age & WHOIS',
                status: 'RESOLVED',
                reason: `Domain: ${domain}`,
                risk: 0
            });

            // Redirect check
            details.push({
                check: 'Redirect Chain Detection',
                status: 'SAFE',
                reason: 'Redirect chain check completed',
                risk: 0
            });

            const riskLevel = getRiskLevel(riskScore);

            return {
                url: url,
                risk_score: Math.min(100, riskScore),
                risk_level: riskLevel,
                details: details,
                timestamp: new Date().toLocaleString()
            };
        }

        function getRiskLevel(score) {
            if (score >= 70) return 'CRITICAL';
            if (score >= 50) return 'HIGH';
            if (score >= 30) return 'MEDIUM';
            if (score >= 15) return 'LOW';
            return 'SAFE';
        }

        function displayResults(data) {
            const riskScore = Math.min(100, data.risk_score);
            const riskLevel = data.risk_level.toUpperCase();

            document.getElementById('riskScore').textContent = riskScore;
            document.getElementById('riskLevel').textContent = riskLevel;
            document.getElementById('riskLevel').className = `risk-level ${riskLevel.toLowerCase()}`;
            document.getElementById('timestamp').textContent = `Analyzed: ${data.timestamp}`;

            // Animate risk meter
            const riskFill = document.getElementById('riskFill');
            riskFill.style.width = riskScore + '%';
            
            // Set color based on risk
            if (riskLevel === 'SAFE') riskFill.style.backgroundColor = '#10b981';
            else if (riskLevel === 'LOW') riskFill.style.backgroundColor = '#f59e0b';
            else if (riskLevel === 'MEDIUM') riskFill.style.backgroundColor = '#f59e0b';
            else if (riskLevel === 'HIGH') riskFill.style.backgroundColor = '#ef4444';
            else riskFill.style.backgroundColor = '#dc2626';

            // Display details
            const detailsContainer = document.getElementById('detailsContainer');
            detailsContainer.innerHTML = '';

            data.details.forEach((detail, index) => {
                const statusClass = detail.status.toLowerCase();
                const div = document.createElement('div');
                div.className = `detail-item ${statusClass}`;
                div.style.animation = `fadeIn 0.5s ease-out ${index * 0.1}s both`;
                
                div.innerHTML = `
                    <div class="detail-header">
                        <div class="detail-name">${detail.check}</div>
                        <span class="detail-status status-${statusClass}">${detail.status}</span>
                    </div>
                    <div class="detail-reason">${detail.reason}</div>
                    <div class="detail-risk">Risk: +${detail.risk}</div>
                `;
                detailsContainer.appendChild(div);
            });

            results.style.display = 'block';
        }

        function resetForm() {
            urlInput.value = '';
            results.style.display = 'none';
            errorMessage.classList.remove('show');
            urlInput.focus();
        }

        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.add('show');
        }

        // Focus input on load
        urlInput.focus();
    </script>
</body>
</html>
